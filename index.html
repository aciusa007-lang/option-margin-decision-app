<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lee Club</title>
  <style>
    :root {
      --bg: #f3efe5;
      --panel: rgba(255, 253, 248, 0.92);
      --ink: #182126;
      --muted: #5e6a70;
      --accent: #0f766e;
      --line: #d8d1c3;
      --shadow: 0 24px 60px rgba(24, 33, 38, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 32%),
        linear-gradient(180deg, #f6f2e9 0%, #eee6d7 100%);
    }

    .portal {
      width: min(100%, 720px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 34px 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font: 700 2rem/1.08 "Trebuchet MS", "Segoe UI", sans-serif;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    a {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0f766e, #14532d);
      color: #fff;
      font: 700 1rem/1 "Trebuchet MS", "Segoe UI", sans-serif;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="portal">
    <h1>Lee Club</h1>
    <p>Private tools and pages for you and your family.</p>
    <a href="/stockoption/">Stock Option Tool</a>
  </main>
</body>
</html>
